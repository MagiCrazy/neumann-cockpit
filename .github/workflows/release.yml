name: Release binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            platform: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            platform: linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-13
            platform: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            platform: macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            platform: windows-x86_64

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN=neumann-cockpit
          ARCHIVE="${BIN}-${{ matrix.platform }}.tar.gz"
          tar czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" "$BIN"
          if command -v sha256sum >/dev/null; then
            sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"
          fi
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $BIN = "neumann-cockpit"
          $ARCHIVE = "${BIN}-${{ matrix.platform }}.zip"
          Compress-Archive -Path "target\${{ matrix.target }}\release\${BIN}.exe" -DestinationPath $ARCHIVE
          $hash = (Get-FileHash -Algorithm SHA256 $ARCHIVE).Hash.ToLower()
          "$hash  $ARCHIVE" | Out-File -FilePath "${ARCHIVE}.sha256" -Encoding ascii
          "ARCHIVE=${ARCHIVE}" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
