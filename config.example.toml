base_url = "https://neumann-probe.net"
api_key  = "vng_your_api_key_here"

# Color mode for the cockpit interface: "mono-green" (default), "mono-amber",
# "phosphor-semantic", or "modern-16" (named ANSI for limited terminals).
# F2 cycles it at runtime.
#theme = "mono-green"
# Show the contextual hints line at the bottom (F1 toggles at runtime).
#hints = true
# Play the boot self-check animation on startup. Set false to drop straight
# into the live cockpit (handy over tmux/ssh or on relaunch).
#boot = true
